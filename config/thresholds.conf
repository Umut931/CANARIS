mass_delete 30
read_then_write 12
profile node 2.0 4000 1
profile npm 2.0 4000 1
profile npm.cmd 2.0 4000 1
profile yarn 2.0 4000 1
profile pnpm 2.0 4000 1
profile git 2.0 3000 1
profile git-remote-http 2.0 3000 1
profile rsync 2.0 5000 1
profile OneDrive 2.0 2000 1
profile onedrive 2.0 2000 1
profile MsMpEng 2.0 10000 1
profile code 2.0 1500 1
profile Code 2.0 1500 1
profile codium 2.0 1500 1
